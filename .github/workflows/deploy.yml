# ============================================================================
# deploy.yml — Apigee proxy deploy pipeline with lint + backup/manual-gated restore
# ============================================================================
name: Apigee Deploy

on:
  push:
    branches: [main]
    paths: ['apiproxy/**', 'env/**', 'pom.xml']
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: uat
        type: choice
        options: [uat, preprod, prod]

env:
  PROXY_NAME: sample-api
  JAVA_VERSION: '17'

jobs:
  # ────────────────────────────────────────────────────────────────────────
  # Job 1: Lint — apigeelint + eslint
  # ────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint proxy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install apigeelint
        run: npm install -g apigeelint

      - name: Run apigeelint
        run: |
          apigeelint -s apiproxy/ -f json.js > apigeelint-results.json || true
          apigeelint -s apiproxy/ -f table.js

      - name: Install eslint (if JS resources exist)
        run: |
          if [ -d "apiproxy/resources/jsc" ] && [ -n "$(ls -A apiproxy/resources/jsc 2>/dev/null)" ]; then
            npm install -g eslint
          fi

      - name: Run eslint on JS resources
        run: |
          if [ -d "apiproxy/resources/jsc" ] && [ -n "$(ls -A apiproxy/resources/jsc 2>/dev/null)" ]; then
            eslint apiproxy/resources/jsc/*.js
          else
            echo "No JS resources found, skipping eslint"
          fi

      - name: Upload lint results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: apigeelint-results
          path: apigeelint-results.json
          retention-days: 7

  # ────────────────────────────────────────────────────────────────────────
  # Job 2: Deploy to UAT
  # ────────────────────────────────────────────────────────────────────────
  deploy_uat:
    name: Deploy to UAT
    runs-on: ubuntu-latest
    needs: lint
    environment: uat
    outputs:
      manifest_artifact: ${{ steps.artifact_name.outputs.name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin

      - name: Make scripts executable
        run: chmod +x scripts/*.sh

      - name: Backup current state
        run: |
          ./scripts/backup.sh \
            "${{ secrets.APIGEE_ORG }}" \
            "${{ secrets.APIGEE_ENV_UAT }}" \
            "${{ env.PROXY_NAME }}" \
            backup-manifest.json

      - name: Read revision from manifest
        id: backup_rev
        run: echo "rev=$(jq -r '.revision // "none"' backup-manifest.json)" >> "$GITHUB_OUTPUT"

      - name: Compute artifact name
        id: artifact_name
        if: always()
        run: echo "name=backup-manifest-uat-rev${{ steps.backup_rev.outputs.rev }}-${{ github.run_id }}" >> "$GITHUB_OUTPUT"

      - name: Sync KVM state from git
        run: |
          ./scripts/sync-kvms.sh \
            "${{ secrets.APIGEE_ORG }}" \
            "${{ secrets.APIGEE_ENV_UAT }}" \
            env/uat/kvms

      - name: Check routing conflicts
        id: change_report
        run: |
          TOKEN=$(gcloud auth print-access-token)
          CURRENT_REV=$(jq -r '.revision' backup-manifest.json)
          NEEDS_SEQUENCE=$(curl -sf -X POST \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Content-Type: application/json" \
            "https://apigee.googleapis.com/v1/organizations/${{ secrets.APIGEE_ORG }}/environments/${{ secrets.APIGEE_ENV_UAT }}/apis/${{ env.PROXY_NAME }}/revisions/${CURRENT_REV}/deployments:generateDeployChangeReport" | \
            jq '[.routingChanges[]?.shouldSequenceRollout] | any' 2>/dev/null || echo "false")
          echo "needs_sequence=${NEEDS_SEQUENCE}" >> "$GITHUB_OUTPUT"
          echo "Sequenced rollout needed: ${NEEDS_SEQUENCE}"

      - name: Deploy proxy (Maven — package + deploy via UAT profile)
        run: |
          mvn install -P uat \
            -Dapigee.org="${{ secrets.APIGEE_ORG }}" \
            -Dapigee.env="${{ secrets.APIGEE_ENV_UAT }}" \
            -Dapigee.sequencedRollout="${{ steps.change_report.outputs.needs_sequence }}" \
            -Dbearer="$(gcloud auth print-access-token)"

      - name: Health check
        run: |
          ./scripts/health-check.sh \
            "${{ secrets.APIGEE_ORG }}" \
            "${{ secrets.APIGEE_ENV_UAT }}" \
            "${{ env.PROXY_NAME }}"

      - name: Upload backup manifest
        if: always() && hashFiles('backup-manifest.json') != ''
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact_name.outputs.name }}
          path: backup-manifest.json
          retention-days: 30

      - name: List recent backups (summary)
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./scripts/list-backups.sh uat >> "$GITHUB_STEP_SUMMARY"

  # ────────────────────────────────────────────────────────────────────────
  # Job 3: Restore UAT (manual-gated, on deploy failure)
  # ────────────────────────────────────────────────────────────────────────
  restore_uat:
    name: Restore UAT (gated)
    runs-on: ubuntu-latest
    needs: deploy_uat
    if: failure() && needs.deploy_uat.result == 'failure'
    environment: uat-restore-approval
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Make scripts executable
        run: chmod +x scripts/*.sh

      - name: Download backup manifest
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.deploy_uat.outputs.manifest_artifact }}
          path: .

      - name: Show manifest summary
        run: jq '{org, env, proxy, revision, timestamp}' backup-manifest.json

      - name: Restore plan (dry-run)
        run: ./scripts/restore.sh --dry-run backup-manifest.json

      - name: Execute restore
        run: ./scripts/restore.sh backup-manifest.json

      - name: Health check
        run: |
          ./scripts/health-check.sh \
            "${{ secrets.APIGEE_ORG }}" \
            "${{ secrets.APIGEE_ENV_UAT }}" \
            "${{ env.PROXY_NAME }}"

  # ────────────────────────────────────────────────────────────────────────
  # Job 4: Deploy to PreProd (approval gate)
  # ────────────────────────────────────────────────────────────────────────
  deploy_preprod:
    name: Deploy to PreProd
    runs-on: ubuntu-latest
    needs: deploy_uat
    environment: preprod
    outputs:
      manifest_artifact: ${{ steps.artifact_name.outputs.name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin

      - name: Make scripts executable
        run: chmod +x scripts/*.sh

      - name: Backup current state
        run: |
          ./scripts/backup.sh \
            "${{ secrets.APIGEE_ORG }}" \
            "${{ secrets.APIGEE_ENV_PREPROD }}" \
            "${{ env.PROXY_NAME }}" \
            backup-manifest.json

      - name: Read revision from manifest
        id: backup_rev
        run: echo "rev=$(jq -r '.revision // "none"' backup-manifest.json)" >> "$GITHUB_OUTPUT"

      - name: Compute artifact name
        id: artifact_name
        if: always()
        run: echo "name=backup-manifest-preprod-rev${{ steps.backup_rev.outputs.rev }}-${{ github.run_id }}" >> "$GITHUB_OUTPUT"

      - name: Sync KVM state from git
        run: |
          ./scripts/sync-kvms.sh \
            "${{ secrets.APIGEE_ORG }}" \
            "${{ secrets.APIGEE_ENV_PREPROD }}" \
            env/preprod/kvms

      - name: Check routing conflicts
        id: change_report
        run: |
          TOKEN=$(gcloud auth print-access-token)
          CURRENT_REV=$(jq -r '.revision' backup-manifest.json)
          NEEDS_SEQUENCE=$(curl -sf -X POST \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Content-Type: application/json" \
            "https://apigee.googleapis.com/v1/organizations/${{ secrets.APIGEE_ORG }}/environments/${{ secrets.APIGEE_ENV_PREPROD }}/apis/${{ env.PROXY_NAME }}/revisions/${CURRENT_REV}/deployments:generateDeployChangeReport" | \
            jq '[.routingChanges[]?.shouldSequenceRollout] | any' 2>/dev/null || echo "false")
          echo "needs_sequence=${NEEDS_SEQUENCE}" >> "$GITHUB_OUTPUT"

      - name: Deploy proxy (Maven — package + deploy via preprod profile)
        run: |
          mvn install -P preprod \
            -Dapigee.org="${{ secrets.APIGEE_ORG }}" \
            -Dapigee.env="${{ secrets.APIGEE_ENV_PREPROD }}" \
            -Dapigee.sequencedRollout="${{ steps.change_report.outputs.needs_sequence }}" \
            -Dbearer="$(gcloud auth print-access-token)"

      - name: Health check
        run: |
          ./scripts/health-check.sh \
            "${{ secrets.APIGEE_ORG }}" \
            "${{ secrets.APIGEE_ENV_PREPROD }}" \
            "${{ env.PROXY_NAME }}"

      - name: Upload backup manifest
        if: always() && hashFiles('backup-manifest.json') != ''
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact_name.outputs.name }}
          path: backup-manifest.json
          retention-days: 30

      - name: List recent backups (summary)
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./scripts/list-backups.sh preprod >> "$GITHUB_STEP_SUMMARY"

  # ────────────────────────────────────────────────────────────────────────
  # Job 5: Restore PreProd (manual-gated, on deploy failure)
  # ────────────────────────────────────────────────────────────────────────
  restore_preprod:
    name: Restore PreProd (gated)
    runs-on: ubuntu-latest
    needs: deploy_preprod
    if: failure() && needs.deploy_preprod.result == 'failure'
    environment: preprod-restore-approval
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Make scripts executable
        run: chmod +x scripts/*.sh

      - name: Download backup manifest
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.deploy_preprod.outputs.manifest_artifact }}
          path: .

      - name: Show manifest summary
        run: jq '{org, env, proxy, revision, timestamp}' backup-manifest.json

      - name: Restore plan (dry-run)
        run: ./scripts/restore.sh --dry-run backup-manifest.json

      - name: Execute restore
        run: ./scripts/restore.sh backup-manifest.json

      - name: Health check
        run: |
          ./scripts/health-check.sh \
            "${{ secrets.APIGEE_ORG }}" \
            "${{ secrets.APIGEE_ENV_PREPROD }}" \
            "${{ env.PROXY_NAME }}"

  # ────────────────────────────────────────────────────────────────────────
  # Job 6: Deploy to Prod (CAB approval gate)
  # ────────────────────────────────────────────────────────────────────────
  deploy_prod:
    name: Deploy to Prod
    runs-on: ubuntu-latest
    needs: deploy_preprod
    environment: prod
    outputs:
      manifest_artifact: ${{ steps.artifact_name.outputs.name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin

      - name: Make scripts executable
        run: chmod +x scripts/*.sh

      - name: Backup current state
        run: |
          ./scripts/backup.sh \
            "${{ secrets.APIGEE_ORG }}" \
            "${{ secrets.APIGEE_ENV_PROD }}" \
            "${{ env.PROXY_NAME }}" \
            backup-manifest.json

      - name: Read revision from manifest
        id: backup_rev
        run: echo "rev=$(jq -r '.revision // "none"' backup-manifest.json)" >> "$GITHUB_OUTPUT"

      - name: Compute artifact name
        id: artifact_name
        if: always()
        run: echo "name=backup-manifest-prod-rev${{ steps.backup_rev.outputs.rev }}-${{ github.run_id }}" >> "$GITHUB_OUTPUT"

      - name: Sync KVM state from git
        run: |
          ./scripts/sync-kvms.sh \
            "${{ secrets.APIGEE_ORG }}" \
            "${{ secrets.APIGEE_ENV_PROD }}" \
            env/prod/kvms

      - name: Check routing conflicts
        id: change_report
        run: |
          TOKEN=$(gcloud auth print-access-token)
          CURRENT_REV=$(jq -r '.revision' backup-manifest.json)
          NEEDS_SEQUENCE=$(curl -sf -X POST \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Content-Type: application/json" \
            "https://apigee.googleapis.com/v1/organizations/${{ secrets.APIGEE_ORG }}/environments/${{ secrets.APIGEE_ENV_PROD }}/apis/${{ env.PROXY_NAME }}/revisions/${CURRENT_REV}/deployments:generateDeployChangeReport" | \
            jq '[.routingChanges[]?.shouldSequenceRollout] | any' 2>/dev/null || echo "false")
          echo "needs_sequence=${NEEDS_SEQUENCE}" >> "$GITHUB_OUTPUT"

      - name: Deploy proxy (Maven — package + deploy via prod profile)
        run: |
          mvn install -P prod \
            -Dapigee.org="${{ secrets.APIGEE_ORG }}" \
            -Dapigee.env="${{ secrets.APIGEE_ENV_PROD }}" \
            -Dapigee.sequencedRollout="${{ steps.change_report.outputs.needs_sequence }}" \
            -Dbearer="$(gcloud auth print-access-token)"

      - name: Health check
        run: |
          ./scripts/health-check.sh \
            "${{ secrets.APIGEE_ORG }}" \
            "${{ secrets.APIGEE_ENV_PROD }}" \
            "${{ env.PROXY_NAME }}"

      - name: Upload backup manifest
        if: always() && hashFiles('backup-manifest.json') != ''
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact_name.outputs.name }}
          path: backup-manifest.json
          retention-days: 30

      - name: List recent backups (summary)
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./scripts/list-backups.sh prod >> "$GITHUB_STEP_SUMMARY"

  # ────────────────────────────────────────────────────────────────────────
  # Job 7: Restore Prod (manual-gated, on deploy failure)
  # ────────────────────────────────────────────────────────────────────────
  restore_prod:
    name: Restore Prod (gated)
    runs-on: ubuntu-latest
    needs: deploy_prod
    if: failure() && needs.deploy_prod.result == 'failure'
    environment: prod-restore-approval
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Make scripts executable
        run: chmod +x scripts/*.sh

      - name: Download backup manifest
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.deploy_prod.outputs.manifest_artifact }}
          path: .

      - name: Show manifest summary
        run: jq '{org, env, proxy, revision, timestamp}' backup-manifest.json

      - name: Restore plan (dry-run)
        run: ./scripts/restore.sh --dry-run backup-manifest.json

      - name: Execute restore
        run: ./scripts/restore.sh backup-manifest.json

      - name: Health check
        run: |
          ./scripts/health-check.sh \
            "${{ secrets.APIGEE_ORG }}" \
            "${{ secrets.APIGEE_ENV_PROD }}" \
            "${{ env.PROXY_NAME }}"
