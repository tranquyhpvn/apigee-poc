name: List Backups

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Environment (default — all)
        required: false
        type: choice
        default: all
        options: [all, uat, preprod, prod]
      limit:
        description: How many recent backups to show per env
        required: false
        default: '20'
        type: string

jobs:
  list:
    name: List backups (${{ github.event.inputs.environment }})
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: chmod +x scripts/*.sh

      - name: List recent backups
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ENV_INPUT: ${{ github.event.inputs.environment }}
          LIMIT: ${{ github.event.inputs.limit }}
        run: |
          if [[ "${ENV_INPUT}" == "all" ]]; then
            ENVS=(uat preprod prod)
          else
            ENVS=("${ENV_INPUT}")
          fi
          for E in "${ENVS[@]}"; do
            ./scripts/list-backups.sh "$E" "${LIMIT}" >> "$GITHUB_STEP_SUMMARY"
          done
